<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFD700", // Vibrant Yellow for 101 Service
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>body {
    font-family: "Manrope", sans-serif
    }
.map-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAAdHmTuBZQeNlfpUNCdCX6eD8fvGPwvMFKbCIonO6oLCkC-TBImv8O6uVbwFevkq9nXKJKjS9uHsJMsRuhmRJMAieuHiS977qHJ5Rcs1XUD0zZIY0baLT2y8QS1XEJ4j7CSwhC2XGrv3fWh2poZKOnb2Tk0TEbGxhegWmiIF8v6VntJr4WnDpTMtIWASAsOeb0B6rPDvuFYNBxu5QCHSxWqzAX5DMkjFpR2YL_aqi0Y3qDLSnwDoFxalYijHWBjelhrQypdXOhuKk);
    background-size: cover;
    background-position: center
    }
.ios-blur {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Main Container -->
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl border-x border-slate-200 dark:border-slate-800">
<!-- Map Background Layer -->
<div class="absolute inset-0 z-0 map-bg" data-alt="Minimalist urban street map with soft grey and white tones" data-location="São Paulo City Map" style="">
<!-- Simulated Vehicle Icons -->
<div class="absolute top-1/3 left-1/4 animate-pulse">
<div class="bg-slate-900 text-primary p-1 rounded-full shadow-lg">
<span class="material-symbols-outlined block text-lg">local_taxi</span>
</div>
</div>
<div class="absolute top-1/2 right-1/3">
<div class="bg-slate-900 text-primary p-1 rounded-full shadow-lg">
<span class="material-symbols-outlined block text-lg">local_taxi</span>
</div>
</div>
<div class="absolute bottom-1/3 left-1/2">
<div class="bg-slate-900 text-primary p-1 rounded-full shadow-lg">
<span class="material-symbols-outlined block text-lg">local_taxi</span>
</div>
</div>
</div>
<!-- Top Header -->
<div class="relative z-10 flex items-center justify-between p-4 mt-2">
<button class="size-10 flex items-center justify-center bg-white/90 dark:bg-slate-900/90 rounded-full shadow-md ios-blur">
<span class="material-symbols-outlined text-slate-900 dark:text-white">menu</span>
</button>
<div class="bg-white/90 dark:bg-slate-900/90 px-4 py-2 rounded-full shadow-md ios-blur flex items-center gap-2">
<span class="size-2 bg-green-500 rounded-full"></span>
<span class="text-xs font-bold uppercase tracking-wider">101 Service</span>
</div>
<button class="size-10 flex items-center justify-center bg-white/90 dark:bg-slate-900/90 rounded-full shadow-md ios-blur">
<span class="material-symbols-outlined text-slate-900 dark:text-white">notifications</span>
</button>
</div>
<!-- Spacer for Map visibility -->
<div class="flex-1"></div>
<!-- Bottom Sheet UI -->
<div class="relative z-20 flex flex-col bg-white dark:bg-slate-900 rounded-t-xl shadow-[0_-10px_30px_rgba(0,0,0,0.1)] pt-2">
<!-- Drag Handle -->
<div class="flex justify-center py-2">
<div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
</div>
<div class="px-5 pb-6">
<!-- Greeting -->
<h1 class="text-2xl font-bold mb-4">Olá, João</h1>
<!-- Search Bar -->
<div class="relative mb-6">
<div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-xl px-4 py-3.5 shadow-sm border border-slate-200/50 dark:border-slate-700/50">
<span class="material-symbols-outlined text-primary mr-3 font-bold">search</span>
<input class="bg-transparent border-none focus:ring-0 p-0 text-lg font-medium w-full placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Para onde?" type="text"/>
<div class="h-6 w-[1px] bg-slate-300 dark:bg-slate-600 mx-3"></div>
<button class="flex items-center gap-1 text-xs font-bold text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-sm">schedule</span>
                            Agora
                        </button>
</div>
</div>
<!-- Quick Access Locations -->
<div class="space-y-4">
<div class="flex items-center gap-4 group cursor-pointer">
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-slate-900 transition-colors">
<span class="material-symbols-outlined">home</span>
</div>
<div class="flex-1 border-b border-slate-100 dark:border-slate-800 pb-3">
<p class="font-bold text-slate-900 dark:text-white">Casa</p>
<p class="text-sm text-slate-500">Rua das Flores, 123</p>
</div>
</div>
<div class="flex items-center gap-4 group cursor-pointer">
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-slate-900 transition-colors">
<span class="material-symbols-outlined">work</span>
</div>
<div class="flex-1 border-b border-slate-100 dark:border-slate-800 pb-3">
<p class="font-bold text-slate-900 dark:text-white">Trabalho</p>
<p class="text-sm text-slate-500">Av. Paulista, 1000</p>
</div>
</div>
<div class="flex items-center gap-4 group cursor-pointer">
<div class="size-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined">star</span>
</div>
<div class="flex-1 pb-1">
<p class="font-bold text-slate-900 dark:text-white">Lugares salvos</p>
</div>
</div>
</div>
<!-- Suggestions/Promo Section -->
<div class="mt-8">
<h3 class="font-bold text-slate-900 dark:text-white mb-4">Sugestões</h3>
<div class="flex gap-4 overflow-x-auto pb-2 no-scrollbar">
<div class="min-w-[140px] bg-primary rounded-xl p-4 flex flex-col gap-2">
<span class="material-symbols-outlined text-3xl text-slate-900">local_taxi</span>
<span class="font-bold text-slate-900 text-sm">Viagem</span>
</div>
<div class="min-w-[140px] bg-slate-100 dark:bg-slate-800 rounded-xl p-4 flex flex-col gap-2 border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-3xl text-primary">package_2</span>
<span class="font-bold text-slate-900 dark:text-white text-sm">Entrega</span>
</div>
<div class="min-w-[140px] bg-slate-100 dark:bg-slate-800 rounded-xl p-4 flex flex-col gap-2 border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-3xl text-primary">directions_bike</span>
<span class="font-bold text-slate-900 dark:text-white text-sm">Duas Rodas</span>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<nav class="relative z-30 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 px-6 pb-8 pt-3 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined font-variation-fill">home</span>
<span class="text-[10px] font-bold">Início</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="text-[10px] font-bold">Serviços</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-bold">Atividade</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold">Perfil</span>
</a>
</nav>
<!-- Floating Action Button for Map centering -->
<button class="absolute bottom-[440px] right-4 z-10 size-12 bg-white dark:bg-slate-900 rounded-full shadow-lg flex items-center justify-center text-slate-700 dark:text-white ios-blur">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</body></html>
