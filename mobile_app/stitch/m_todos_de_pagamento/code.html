<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFD700",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>101 Service - Métodos de Pagamento</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto bg-background-light dark:bg-background-dark min-h-screen flex flex-col relative">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold flex-1 text-center pr-10">Métodos de Pagamento</h1>
</header>
<main class="flex-1 overflow-y-auto pb-32">
<!-- Brand Logo/Header subtle mention -->
<div class="px-6 pt-6 pb-2">
<p class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">101 Service Payments</p>
</div>
<!-- Cartões Salvos -->
<section class="px-4 py-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight px-2 pb-4">Cartões Salvos</h3>
<div class="bg-white dark:bg-slate-900 rounded-xl p-4 shadow-sm border border-slate-100 dark:border-slate-800 flex items-center justify-between group">
<div class="flex items-center gap-4">
<div class="w-12 h-8 rounded-md bg-slate-100 dark:bg-slate-800 flex items-center justify-center overflow-hidden border border-slate-200 dark:border-slate-700">
<img alt="Mastercard Logo" class="h-5 w-auto" data-alt="Logo da bandeira de cartão Mastercard" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBIvjAojTjhYDhBte_xj-_1lwanYDVcN5xtU6_vGWAEwcBVEIiGoZ6KFIibxTyGVuCcft2QxOXESlP44WwZeTlnAhbdwPTw264WuseeJ-s_i_P6Bt34fw6buwQPayCoe5XuatzHaKR0l8PInsV8jCGBydgjzbjdRhuXOCL_RnKLiUeinOoJAFMt48ba501ZD8yqtYKw68vcroi3CSxHqy85acqs8fj9hlUZ0Q2eH-qJvyWZSx7EssM6zBb_GSDHtT6BibYG3gRhkQ"/>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal">Mastercard •••• 4242</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium">Expira em 12/26 • Padrão</p>
</div>
</div>
<div class="flex items-center">
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</div>
</div>
</section>
<!-- Adicionar Novo Método -->
<section class="px-4 py-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight px-2 pb-4">Outras Formas de Pagamento</h3>
<div class="bg-white dark:bg-slate-900 rounded-xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-800">
<!-- Option: Card -->
<button class="w-full flex items-center justify-between p-4 border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">credit_card</span>
</div>
<span class="text-base font-medium">Cartão de Crédito/Débito</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<!-- Option: Pix -->
<button class="w-full flex items-center justify-between p-4 border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-teal-50 dark:bg-teal-900/30 flex items-center justify-center text-teal-600 dark:text-teal-400">
<span class="material-symbols-outlined">bolt</span>
</div>
<div class="flex flex-col items-start">
<span class="text-base font-medium">Pix</span>
<span class="text-[10px] bg-teal-100 dark:bg-teal-900/50 text-teal-700 dark:text-teal-300 px-1.5 py-0.5 rounded font-bold uppercase tracking-tight">Instantâneo</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<!-- Option: Boleto -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">barcode_scanner</span>
</div>
<span class="text-base font-medium">Boleto Bancário</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- Security Info -->
<div class="px-8 mt-4 flex flex-col items-center text-center gap-2">
<div class="flex items-center gap-1.5 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-sm">lock</span>
<p class="text-[11px] font-medium uppercase tracking-widest">Pagamento 100% Seguro</p>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed px-4">
                    Suas informações de pagamento são criptografadas e nunca armazenadas diretamente em nossos servidores.
                </p>
</div>
</main>
<!-- Bottom Action Button -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/95 dark:via-background-dark/95 to-transparent">
<button class="w-full bg-primary hover:bg-primary/90 text-slate-900 font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">add_circle</span>
                Adicionar Novo Cartão
            </button>
</div>
</div>
</body></html>
