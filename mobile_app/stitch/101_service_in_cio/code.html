<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFD700",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>body {
    font-family: "Manrope", sans-serif
    }
.map-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAQ6MtnvF97O7qGUoI5XMGQmHBVBUchehfodoIhYlajAveG0Gl9cPAIcEpFxlvHSEW3yRx8GTePQX6ML8Aazhg5i0fNF3Lpoht3vpnmBkv4qT5i0D2XDbkiyF2Y87qY69PLSny_smx7L8k4WYJlW__GRfmeWSsahzUQdCqbCevhK6ejZZBX54X3PIdo8PZvhRLuiMLK4qbJL0AuVPx8XljS_V8ijWUSsoRysG_9CsBg6xcErmSpkBBMl05gItQ29gg5Vw9qEZhd8xI);
    background-size: cover;
    background-position: center
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header Branding -->
<header class="bg-primary px-4 py-4 flex items-center justify-between shadow-md z-20">
<div class="flex items-center gap-3">
<div class="bg-black p-1.5 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl">local_taxi</span>
</div>
<h1 class="text-black text-xl font-extrabold tracking-tight">101 SERVICE</h1>
</div>
<div class="flex gap-2">
<button class="bg-black/10 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-black">notifications</span>
</button>
<button class="bg-black/10 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-black">person</span>
</button>
</div>
</header>
<!-- Map Section -->
<div class="relative flex-1 map-bg" data-alt="Simplified city map with navigation routes" data-location="São Paulo, Brazil" style="">
<!-- Floating Map Actions -->
<div class="absolute right-4 top-4 flex flex-col gap-2">
<button class="bg-white dark:bg-slate-800 p-3 rounded-full shadow-lg border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">my_location</span>
</button>
</div>
<!-- Fake Map Pins -->
<div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div class="relative">
<div class="h-4 w-4 bg-primary border-2 border-black rounded-full animate-pulse"></div>
<div class="absolute -top-10 -left-6 bg-black text-primary px-2 py-1 rounded text-xs font-bold whitespace-nowrap">
                        Você está aqui
                    </div>
</div>
</div>
</div>
<!-- Bottom Sheet UI -->
<div class="bg-white dark:bg-slate-900 rounded-t-xl shadow-[0_-8px_30px_rgb(0,0,0,0.12)] px-4 pt-2 pb-8 z-30">
<!-- Handle -->
<div class="flex justify-center mb-4">
<div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
</div>
<!-- Title -->
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold mb-4 px-1">Olá, para onde vamos?</h2>
<!-- Search Bar -->
<div class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 flex items-center gap-3 mb-6 border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-primary text-2xl">search</span>
<input class="bg-transparent border-none focus:ring-0 text-slate-900 dark:text-slate-100 w-full font-medium" placeholder="Para onde?" type="text"/>
</div>
<!-- Quick Access Services -->
<div class="grid grid-cols-2 gap-4 mb-6">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-primary transition-colors group">
<div class="bg-primary p-4 rounded-xl shadow-sm group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-black text-3xl font-bold">directions_car</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold">Viagem</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-primary transition-colors group">
<div class="bg-primary p-4 rounded-xl shadow-sm group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-black text-3xl font-bold">inventory_2</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold">Serviço</span>
</button>
</div>
<!-- Recent Destinations -->
<div class="space-y-4">
<div class="flex items-center gap-4 py-2">
<div class="bg-slate-100 dark:bg-slate-800 p-2 rounded-full">
<span class="material-symbols-outlined text-slate-500">history</span>
</div>
<div class="flex-1">
<p class="text-slate-900 dark:text-slate-100 font-semibold text-sm">Avenida Paulista, 1000</p>
<p class="text-slate-500 text-xs">Bela Vista, São Paulo</p>
</div>
</div>
<div class="flex items-center gap-4 py-2">
<div class="bg-slate-100 dark:bg-slate-800 p-2 rounded-full">
<span class="material-symbols-outlined text-slate-500">home</span>
</div>
<div class="flex-1">
<p class="text-slate-900 dark:text-slate-100 font-semibold text-sm">Casa</p>
<p class="text-slate-500 text-xs">Rua Oscar Freire, 50</p>
</div>
</div>
</div>
</div>
<!-- Navigation Bar -->
<nav class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-3 flex justify-between items-center z-40">
<a class="flex flex-col items-center gap-1 text-black font-bold" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
<span class="text-[10px]">Início</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="text-[10px]">Serviços</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px]">Atividade</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">account_circle</span>
<span class="text-[10px]">Conta</span>
</a>
</nav>
</div>
</body></html>
