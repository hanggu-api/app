<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFD700", // Yellow highlight branding
                        "primary-dark": "#E6C200",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<header class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between p-4 bg-white/80 dark:bg-background-dark/80 ios-blur border-b border-slate-200/50 dark:border-slate-800/50">
<button class="flex size-10 items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h2 class="text-sm font-bold leading-tight tracking-tight uppercase text-slate-500 dark:text-slate-400">101 Service</h2>
<p class="text-xs font-semibold text-primary-dark">Em curso</p>
</div>
<button class="flex size-10 items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">more_horiz</span>
</button>
</header>
<!-- Map Area -->
<main class="relative flex-1 bg-slate-200 dark:bg-slate-900 overflow-hidden">
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="Interactive map showing a travel route from point A to B" data-location="Lisbon, Portugal" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBbhe5byFDfprbw4vJyNh5fchGHlhtI9jmXEvcrWx7IO_NYDocst4S26Qu7JwH99lLNTr-51gCdNxZUcp6ml6bFYrPKOM9vFxadBXqwkncXkl48cyIXjr3UgXjI9xeMVWOxe_KpyEMe0nwHIV3txnDS3NXGoJDHzbhsCjiqbqrJdpZxdF7_baeWOHnxKnBGmowSyHw5EvXLkaOeGPmZgwGD6dY__8rreSPV-nHJUpkgWEVzpmIOFuzu0E2WoXj7hahPEy-9dJWH014')">
</div>
<!-- Map Overlay Controls -->
<div class="absolute right-4 bottom-72 z-10 flex flex-col gap-3">
<button class="flex size-12 items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-lg text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">my_location</span>
</button>
<div class="flex flex-col rounded-2xl bg-white dark:bg-slate-800 shadow-lg overflow-hidden">
<button class="flex size-12 items-center justify-center border-b border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">add</span>
</button>
<button class="flex size-12 items-center justify-center">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">remove</span>
</button>
</div>
</div>
</main>
<!-- Floating Driver Details Card -->
<div class="absolute bottom-20 left-0 right-0 z-30 px-4 pb-4">
<div class="flex flex-col bg-white dark:bg-slate-900/90 ios-blur rounded-xl shadow-2xl border border-slate-200/50 dark:border-slate-700/50 overflow-hidden">
<!-- Status Bar -->
<div class="bg-primary/10 px-4 py-2 flex items-center justify-between border-b border-primary/20">
<div class="flex items-center gap-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary-dark opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary-dark"></span>
</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary-dark">Chegada em 4 min</span>
</div>
<span class="text-[10px] font-bold text-slate-500 uppercase">Toyota Corolla • ABC-1234</span>
</div>
<!-- Driver Info Section -->
<div class="p-4 flex items-center justify-between gap-4">
<div class="flex items-center gap-4">
<div class="relative">
<img alt="Ricardo" class="size-14 rounded-full object-cover border-2 border-primary shadow-sm" data-alt="Professional driver portrait Ricardo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHRWCf3U6NipzJUcidEZWojyWUlHgLTXGbnmptk1OgTa2fVFZwYXarpJQeTnk-UoxvgbFTUtryXl6VBKyPCccFq6t475KlwCMaJJZkeLV0dhNOXyYFV9srYV_tGnjQ3H1SPjvFMq695SG3j4DQLZ0o2hBZ_OBSWmlTd6fAE67M2ayZgo6jqq4_ced4wTAcOsiidU9jDeaE0mNZ2kZnIrp98EoD7T4sKqJmEV8v6cU9vCeRvr_GsVSc67linCprpIw-u6qONDbU0PQ"/>
<div class="absolute -bottom-1 -right-1 bg-primary text-slate-900 text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-white">
                                4.9 ★
                            </div>
</div>
<div class="flex flex-col">
<h3 class="text-lg font-extrabold text-slate-900 dark:text-slate-100">Ricardo</h3>
<p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Toyota Corolla • Prata</p>
<p class="text-xs font-bold text-slate-400 dark:text-slate-500 mt-0.5 tracking-widest">ABC-1234</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="flex size-12 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 transition-colors">
<span class="material-symbols-outlined">chat_bubble</span>
</button>
<button class="flex size-12 items-center justify-center rounded-full bg-primary text-slate-900 shadow-md shadow-primary/20 transition-transform active:scale-95">
<span class="material-symbols-outlined">call</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="px-4 pb-4">
<button class="w-full h-12 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-lg font-bold flex items-center justify-center gap-2 tracking-tight">
<span>Detalhes da Viagem</span>
<span class="material-symbols-outlined text-sm">keyboard_arrow_up</span>
</button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<nav class="absolute bottom-0 left-0 right-0 z-40 bg-white/95 dark:bg-background-dark/95 ios-blur border-t border-slate-200/50 dark:border-slate-800/50 pb-safe">
<div class="flex h-20 items-center justify-around px-4">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold">Início</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary-dark" href="#">
<div class="relative">
<span class="material-symbols-outlined fill-[1]">directions_car</span>
<div class="absolute -top-1 -right-1 size-2 rounded-full bg-primary-dark border-2 border-white dark:border-background-dark"></div>
</div>
<span class="text-[10px] font-bold">Viagens</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[10px] font-bold">Carteira</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold">Perfil</span>
</a>
</div>
</nav>
</div>
</body></html>
