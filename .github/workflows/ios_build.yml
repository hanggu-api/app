name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS (No Code Signing)
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' # Ajuste conforme necessário
          cache: true

      - name: Install Dependencies
        working-directory: ./mobile_app
        run: |
          flutter clean
          flutter pub get

      - name: Install Pods
        working-directory: ./mobile_app/ios
        run: |
          pod repo update
          pod install

      - name: Build iOS (Unsigned)
        working-directory: ./mobile_app
        # --no-codesign gera o .app para teste em simuladores ou para ser assinado depois.
        # Para gerar o .ipa instalável, você precisará configurar chaves da Apple (ver instruções abaixo).
        run: flutter build ios --release --no-codesign

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: mobile_app/build/ios/iphoneos/Runner.app
